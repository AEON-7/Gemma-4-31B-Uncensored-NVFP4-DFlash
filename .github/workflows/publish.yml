name: Publish GHCR Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish"
        required: true
        default: "latest"
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/aeon-7/gemma-4-31b-uncensored-nvfp4-dflash:${{ steps.meta.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/AEON-7/Gemma-4-31B-Uncensored-NVFP4-DFlash
            org.opencontainers.image.documentation=https://github.com/AEON-7/Gemma-4-31B-Uncensored-NVFP4-DFlash/blob/main/README.md
            org.opencontainers.image.licenses=Apache-2.0
